name: Mirror partnersinbiz-web to Hermes VPS
#
# Rsyncs the development source tree to /var/lib/hermes/projects/partnersinbiz-web/
# on hermes-vps-01 so all PiB code-capable agents can read project code.
#
# Scaling to other projects:
#   Copy this file into any other repo, update the destination path in the
#   rsync step to match /var/lib/hermes/projects/<repo-name>/, and ensure
#   the same VPS_DEPLOY_KEY / VPS_HOST / VPS_USER secrets are set on that
#   repo (or fork them to a new team's org secrets). The hermes-deploy user
#   on hermes-vps-01 owns the entire /var/lib/hermes/projects/ tree so
#   multiple repos can write side-by-side without extra provisioning.
#
# This is a read-only mirror — no VPS → GitHub auth needed. The GitHub
# Action runner checks out the code, then rsyncs it over SSH to the VPS.
# Commits always flow: Mac → GitHub → VPS (never the other way).
#
on:
  push:
    branches: [development]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: development

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync source tree to VPS
        run: |
          rsync -avz --delete \
            --exclude=node_modules \
            --exclude=.next \
            --exclude=dist \
            --exclude=.vercel \
            --exclude=.git \
            --exclude=.env.local \
            --exclude='*.local.json' \
            ./ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/lib/hermes/projects/partnersinbiz-web/"

      - name: Verify (count files synced)
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'find /var/lib/hermes/projects/partnersinbiz-web -type f | wc -l'
