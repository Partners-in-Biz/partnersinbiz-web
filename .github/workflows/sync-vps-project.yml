name: Mirror partnersinbiz-web to Hermes VPS
#
# Rsyncs the development source tree to a clean mirror at
# /var/lib/hermes/projects/partnersinbiz-web-mirror/ on hermes-vps-01.
# The active writable agent checkout remains
# /var/lib/hermes/projects/partnersinbiz-web-development/.
#
# Scaling to other projects:
#   Copy this file into any other repo, update MIRROR_DIR to match
#   /var/lib/hermes/projects/<repo-name>-mirror, and ensure the same
#   VPS_DEPLOY_KEY / VPS_HOST / VPS_USER secrets are set on that repo (or
#   fork them to a new team's org secrets). The hermes-deploy user must be
#   able to write the mirror directory.
#
# This is a read-only mirror — no VPS → GitHub auth needed. The GitHub
# Action runner checks out the code, then rsyncs it over SSH to the VPS.
# Commits always flow: Mac → GitHub → VPS (never the other way).
#
on:
  push:
    branches: [development]
  workflow_dispatch:

concurrency:
  group: vps-mirror-${{ github.ref }}
  cancel-in-progress: false

env:
  MIRROR_DIR: /var/lib/hermes/projects/partnersinbiz-web-mirror

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: development

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare VPS mirror directory
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "mkdir -p '$MIRROR_DIR'"

      - name: Rsync source tree to VPS
        run: |
          rsync -rlz --delete --omit-dir-times --no-perms --no-owner --no-group \
            --exclude=node_modules \
            --exclude=.next \
            --exclude=dist \
            --exclude=.vercel \
            --exclude=.git \
            --exclude=.env \
            --exclude=.env.* \
            --exclude='*.local.json' \
            --exclude='*.log' \
            ./ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:$MIRROR_DIR/"

      - name: Verify (count files synced)
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "test -d '$MIRROR_DIR' && find '$MIRROR_DIR' -type f | wc -l"
