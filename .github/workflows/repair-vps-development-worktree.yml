name: Repair VPS development worktree

on:
  workflow_dispatch:

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Checkpoint and rebase active development worktree
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" 'bash -s' <<'REMOTE'
          set -euo pipefail

          repo="/var/lib/hermes/projects/partnersinbiz-web-development"
          if [ ! -d "$repo/.git" ]; then
            echo "Active development repo is missing: $repo" >&2
            exit 1
          fi

          cd "$repo"
          echo "== Before =="
          git status --short --branch

          branch="$(git branch --show-current)"
          if [ "$branch" != "development" ]; then
            echo "Expected development branch, found $branch" >&2
            exit 1
          fi

          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore(agent): checkpoint existing local work before sync" || true
          fi

          git fetch origin development
          git rebase origin/development

          echo "== After =="
          git status --short --branch
          git log -3 --oneline
          REMOTE

      - name: Patch live profile instructions
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" 'bash -s' <<'REMOTE'
          set -euo pipefail

          for profile in partners-main pip theo maya sage nora; do
            soul="/var/lib/hermes/profiles/$profile/SOUL.md"
            if [ ! -f "$soul" ]; then
              continue
            fi
            python3 - "$soul" <<'PY'
          from pathlib import Path
          import sys

          path = Path(sys.argv[1])
          text = path.read_text()
          marker = "## Git Sync Rule"
          rule = """## Git Sync Rule
- This applies to every PiB code-capable agent: Pip, Theo, Maya, Sage, Nora, and partners-main.
- The active code repo is `/var/lib/hermes/projects/partnersinbiz-web-development` on branch `development`.
- Dirty worktrees and local modifications are not blockers. If local changes exist before pulling, preserve them with `git add -A` and `git commit -m "chore(agent): checkpoint existing local work before sync"`.
- Pull latest code with `git pull --rebase origin development`, resolve straightforward conflicts, then continue the task.
- Do not ask Peet whether to preserve or discard local work just because pull would overwrite a file. Preserve it in a checkpoint commit and continue.
- When finished, commit and push task work to `origin/development`.
"""
          if marker in text:
            before, _, rest = text.partition(marker)
            next_section = rest.find("\n## ", 1)
            if next_section == -1:
              text = before.rstrip() + "\n\n" + rule
            else:
              text = before.rstrip() + "\n\n" + rule + rest[next_section:].lstrip("\n")
          else:
            text = text.rstrip() + "\n\n" + rule
          path.write_text(text)
          PY
          done

          echo "Patched live profile SOUL files:"
          grep -R "Dirty worktrees and local modifications are not blockers" -n /var/lib/hermes/profiles/{partners-main,pip,theo,maya,sage,nora}/SOUL.md || true
          REMOTE
