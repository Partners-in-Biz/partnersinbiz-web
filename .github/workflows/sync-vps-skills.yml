name: Sync VPS platform skills
# Runs from development so VPS agents consume the same branch they work on.
on:
  push:
    branches: [development]
    paths:
      - '.claude/skills/**'
      - '.github/workflows/sync-vps-skills.yml'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: development

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync platform skills to VPS
        run: |
          # Use -rlz instead of -avz: skip preserving times/perms/owner/group.
          # The hermes-deploy user has group-write but isn't the owner of the
          # destination dirs, so utime() fails ("Operation not permitted").
          # We only need content + filenames; times/perms aren't load-bearing here.
          for skill in analytics billing-finance client-documents client-manager content-engine crm-sales email-outreach platform-ops project-management properties seo-sprint-manager social-media-manager; do
            if [ -d ".claude/skills/$skill" ]; then
              echo "-> rsyncing $skill"
              rsync -rlz --delete --omit-dir-times --no-perms \
                ".claude/skills/$skill/" \
                "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/lib/hermes/pib-skills/partnersinbiz/$skill/"
            else
              echo "-- skipping $skill (not found in repo)"
            fi
          done
          echo "Sync complete"
